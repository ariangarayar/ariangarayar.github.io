<!doctype html>

    <title>Ast4 | Tags</title>
    <link rel="icon" type="image/jpeg" href="assets/avatar.jpg">
    <link rel="stylesheet" href="styles.css">

  <body class="tags-page">
    <aside class="site-sidebar" aria-label="Perfil de Ast4">
      <a class="avatar-link" href="index.html" aria-label="Ir al inicio">
        <img src="assets/avatar.jpg" alt="Avatar de Ast4">
      </a>

      <h1>Ast4</h1>
      <p class="sidebar-bio">
        Estudiante Sanmarquino apasionado por la ciberseguridad y redes.
      </p>

      <nav class="side-nav" aria-label="Navegación principal">

        <a href="index.html#writeups">Resoluciones</a>

        <a href="https://www.linkedin.com/in/arian-navid-garayar-alverca563aba2a7/?skipRedirect=true" target="_blank" rel="noreferrer">LinkedIn</a>

        <aside class="tags-visual" aria-label="Animación de Black Clover">
          <a href="https://es.pinterest.com/pin/633107660154632571/" target="_blank" rel="noreferrer">
            <img src="assets/black-clover-banner.gif" alt="Animación de Black Clover">
